name: Preview Teardown

on:
  pull_request_target:
    types: [closed]

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preview-teardown:
    runs-on: ubuntu-latest
    steps:
      - name: Install Surge
        run: npm install surge

      - name: Download commit SHAs artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-${{ github.event.number }}-shas
        continue-on-error: true
        id: download-shas

      - name: Teardown commit-pinned surge previews
        if: steps.download-shas.outcome == 'success'
        run: |
          while IFS= read -r sha; do
            npx surge teardown quarkusclub-blog-pr-${{ github.event.number }}-${sha}-preview.surge.sh --token ${{ secrets.SURGE_TOKEN }} || true
          done < commit-shas.txt

      - name: Teardown latest surge preview
        run: npx surge teardown quarkusclub-blog-pr-${{ github.event.number }}-preview.surge.sh --token ${{ secrets.SURGE_TOKEN }}

      - name: Update PR status comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- Sticky Pull Request Comment -->';
            const body = `${marker}

            🙈 The PR is closed and the preview is expired.
            `;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.number }},
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ github.event.number }},
                body,
              });
            }
